services:
  # Build everything + package into output/ and ZIP
  # Usage: docker compose run --rm build
  #
  # Uses the pre-built image from GHCR which contains libstratosphere.a
  # and all devkitPro packages. No lib rebuilding needed.
  build:
    image: ghcr.io/ethiquema/ryu_ldn_nx:latest
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
    working_dir: /workspace
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        # Symlink pre-built libstratosphere.a from the container image
        # into the checked-out workspace so the sysmodule Makefile finds it
        # without rebuilding from source.
        LIB_DIR="/workspace/sysmodule/Atmosphere-libs/libstratosphere/lib/nintendo_nx_arm64_armv8a/release"
        PREBUILT="/opt/ryu_ldn_nx/libstratosphere/lib/nintendo_nx_arm64_armv8a/release/libstratosphere.a"
        if [ -f "$PREBUILT" ] && [ ! -f "$LIB_DIR/libstratosphere.a" ]; then
          mkdir -p "$LIB_DIR"
          ln -s "$PREBUILT" "$LIB_DIR/libstratosphere.a"
          echo "[build] Linked pre-built libstratosphere.a"
        fi

        echo "[build] 🔨 Building sysmodule..."
        cd /workspace/sysmodule && make -j4 all

        echo "[build] 🔨 Building overlay..."
        cd /workspace/overlay && make -j4 all

        echo "[build] 📦 Packaging SD card structure..."
        cd /workspace/sysmodule && make dist

        echo "[build] ✅ Done — output/ and ryu_ldn_nx-release.zip ready"

  # Clean all build artifacts + output
  # Usage: docker compose run --rm clean
  clean:
    image: ghcr.io/ethiquema/ryu_ldn_nx:latest
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
    working_dir: /workspace
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "[clean] 🧹 Cleaning sysmodule..."
        cd /workspace/sysmodule && make clean 2>/dev/null || true
        echo "[clean] 🧹 Cleaning overlay..."
        cd /workspace/overlay && make clean 2>/dev/null || true
        echo "[clean] 🧹 Removing output..."
        echo "[clean] 🧹 Cleaning tests..."
        cd /workspace/tests && make clean 2>/dev/null || true
        rm -rf /workspace/output /workspace/ryu_ldn_nx-release.zip
        echo "[clean] ✅ Done"

  # Run tests (host binary with g++)
  # NOTE: tests run on the host, not in the dev container — they use
  # g++ and don't need cross-compilation. This is kept as a fallback.
  test:
    image: ghcr.io/ethiquema/ryu_ldn_nx:latest
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
    working_dir: /workspace/tests
    command: make clean test

  # GDB debugger for Switch (interactive)
  # Usage: docker compose run --rm debugger <SWITCH_IP> [PROCESS_ID]
  debugger:
    image: ghcr.io/ethiquema/ryu_ldn_nx:latest
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
    working_dir: /workspace
    network_mode: host
    stdin_open: true
    tty: true
    entrypoint: ["/workspace/scripts/debugger/debug.sh"]

  # Run clang-tidy on project source files (not Atmosphere-libs)
  # Usage: docker compose run --rm lint
  lint:
    image: ghcr.io/ethiquema/ryu_ldn_nx:latest
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
    working_dir: /workspace
    entrypoint: ["/bin/bash", "/workspace/scripts/lint.sh"]

  # Run CodeQL analysis (standalone CLI, no GitHub Actions needed)
  # Usage: docker compose run --rm codeql-analyze
  codeql-create:
    image: ghcr.io/ethiquema/ryu_ldn_nx:latest
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
    working_dir: /workspace
    entrypoint: ["/bin/bash", "/workspace/scripts/codeql-create.sh"]

  codeql-analyze:
    image: ghcr.io/ethiquema/ryu_ldn_nx:latest
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
    working_dir: /workspace
    entrypoint: ["/bin/bash", "/workspace/scripts/codeql-analyze.sh"]

  shell:
    image: ghcr.io/ethiquema/ryu_ldn_nx:latest
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
    working_dir: /workspace
    network_mode: host
    stdin_open: true
    tty: true
    entrypoint: ["/bin/bash"]