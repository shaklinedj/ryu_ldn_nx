services:
  # Build everything + package into output/ and ZIP
  # Usage: docker compose run --rm build
  build:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
    working_dir: /workspace
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "[build] 🔨 Building libstratosphere..."
        cd /workspace/sysmodule/Atmosphere-libs/libstratosphere && make -j4 nx_release

        echo "[build] 🔨 Building sysmodule..."
        cd /workspace/sysmodule && make -j4 all

        echo "[build] 🔨 Building overlay..."
        cd /workspace/overlay && make -j4 all

        echo "[build] 📦 Packaging SD card structure..."
        cd /workspace/sysmodule && make dist

        echo "[build] ✅ Done — output/ and ryu_ldn_nx-release.zip ready"

  # Clean all build artifacts + output
  # Usage: docker compose run --rm clean
  clean:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
    working_dir: /workspace
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "[clean] 🧹 Cleaning sysmodule..."
        cd /workspace/sysmodule && make clean 2>/dev/null || true
        echo "[clean] 🧹 Cleaning overlay..."
        cd /workspace/overlay && make clean 2>/dev/null || true
        echo "[clean] 🧹 Removing output..."
        rm -rf /workspace/output /workspace/ryu_ldn_nx-release.zip
        echo "[clean] ✅ Done"

  # Run tests (host binary with g++)
  test:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
    working_dir: /workspace/tests
    command: make test

  # GDB debugger for Switch (interactive)
  # Usage: docker compose run --rm debugger <SWITCH_IP> [PROCESS_ID]
  debugger:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
    working_dir: /workspace
    network_mode: host
    stdin_open: true
    tty: true
    entrypoint: ["/workspace/scripts/debugger/debug.sh"]

  shell:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
    working_dir: /workspace
    network_mode: host
    stdin_open: true
    tty: true
    entrypoint: ["/bin/bash"]