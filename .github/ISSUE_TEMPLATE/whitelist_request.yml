name: Whitelist Request
description: "Request that a game be added to the LDN whitelist in ryu\_ldn\_nx so it can use Local Wireless multiplayer"
title: "[WHITELIST] "
labels: [whitelist-request]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Use this form to request that a game be **added to the LDN whitelist** so it can use Local Wireless multiplayer via `ryu ldn nx`.

        Games not in the whitelist cannot connect to LDN sessions at all. 
        
        This is different from a game that connects but has issues — use **Game Problem Report** for that.

        💡 **How to find your Title ID:**
        > Look it up on homebrews with title managers (GoldLeaf, Spharia ...) or on a public database.

        **Not for:**
        
        - A game that connects but has bugs → **Game Problem Report**
        
        - A game version with a known security vulnerability → **Vulnerable Game Version**
        
        - A sysmodule bug unrelated to a specific game → **Bug Report**

  - type: input
    id: game_title
    attributes:
      label: "Game Title"
      description: "Full official game title."
      placeholder: "e.g., Mario Kart 8 Deluxe"
    validations:
      required: true

  - type: input
    id: game_title_id
    attributes:
      label: "Title ID (Program ID)"
      description: "Hexadecimal 16-character Title ID. Look it up on homebrews with title managers (GoldLeaf, Spharia ...) or on a public database."
      placeholder: "e.g., 0100152000022000"
    validations:
      required: true

  - type: textarea
    id: informations
    attributes:
      label: "Additional informations"
      description: "Explain why this game should be whitelisted. For example: the game doesn't support Local Wireless natively but a mod adds it, or this is a regional variant of an already-whitelisted title."
      placeholder: |
        This game does not support Local Wireless by default, but the [mod name] mod adds local multiplayer support via LDN.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: "Pre-submission"
      options:
        - label: "I searched existing whitelist requests and issues for this game"
          required: true
        - label: "I confirmed this game is not already in the whitelist"
          required: true
        - label: "I confirmed this game support Local Communication (Not LAN Mode or Online Multiplayer)"
          required: true
        - label: "I verified the Title ID is correct"
          required: true