name: Game Compatibility Report
description: "Report how a specific game works with ryu\_ldn\_nx"
title: "[GAME] "
labels: [game-compatibility]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Use this form to report how a **specific game** works with `ryu_ldn_nx`.

        > ⚠️ **Does the same problem happen with every game?**
        > If the bug occurs regardless of which game you play (e.g., can't connect at all, overlay crashes), that's a **systemic issue** — open a **Bug Report** instead.

        > 🔒 **Want to report a dangerous game version (RCE, exploit)?**
        > If a game version has a known security vulnerability that should be blocked, open a **Vulnerable Game Version** report instead — it captures CVE references, exploit type, and block urgency.

        **Before opening**, search existing game-compatibility issues for this game to avoid duplicates.

  - type: dropdown
    id: report_type
    attributes:
      label: "What are you reporting?"
      options:
        - "✅  Working — multiplayer confirmed functional"
        - "⚠️  Partial — works but has issues"
        - "❌  Broken — multiplayer does not work"
    validations:
      required: true

  - type: input
    id: game_title
    attributes:
      label: "Game Title"
      description: "Full official game title."
      placeholder: "e.g., Mario Kart 8 Deluxe"
    validations:
      required: true

  - type: input
    id: game_version
    attributes:
      label: "Game Version"
      description: "The exact version you tested (shown in the game's title screen or update history)."
      placeholder: "e.g., v2.4.0"
    validations:
      required: true

  - type: input
    id: game_title_id
    attributes:
      label: "Title ID (optional)"
      description: "Hexadecimal Title ID from `sdmc:/atmosphere/contents/`. Helps match the game to our LDN whitelist."
      placeholder: "e.g., 0x0100152000022000"
    validations:
      required: false

  - type: input
    id: switch_firmware
    attributes:
      label: "Switch Firmware Version"
      placeholder: "e.g., 19.0.1"
    validations:
      required: true

  - type: input
    id: atmosphere_version
    attributes:
      label: "Atmosphere Version"
      placeholder: "e.g., 1.7.0"
    validations:
      required: true

  - type: input
    id: ryu_ldn_nx_version
    attributes:
      label: "ryu\_ldn\_nx Version"
      description: "Release tag or commit hash"
      placeholder: "e.g., v1.2.0"
    validations:
      required: true

  - type: dropdown
    id: player_role
    attributes:
      label: "Your Role"
      options:
        - Host
        - Client
        - Both
    validations:
      required: true

  - type: input
    id: number_of_players
    attributes:
      label: "Number of Players in Session"
      placeholder: "e.g., 2, 4, 8"
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: "Your config.ini"
      description: |
        Paste the **full contents** of `sdmc:/config/ryu_ldn_nx/config.ini`.
        Connection mode (relay/P2P), server address, and passphrase are all in this file.
      placeholder: |
        [server]
        host = ...
        port = ...
        use_tls = ...

        [network]
        connect_timeout = ...
        reconnect_delay = ...
        max_reconnect_attempts = ...

        [ldn]
        enabled = ...
        passphrase = ...
        disable_p2p = ...

        [debug]
        enabled = ...
        level = ...
        log_to_file = ...
    validations:
      required: true

  - type: textarea
    id: compatibility_details
    attributes:
      label: "What works and what doesn't?"
      description: "Be specific about which features you tested."
      placeholder: |
        **What works**:
        - Lobby creation
        - Joining a hosted room

        **What doesn't work**:
        - After ~2 minutes in a match, the connection drops
        - Room search returns empty list

        **Notes**:
        - Works fine in relay mode, issues only in P2P
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "Sysmodule Logs (if applicable)"
      description: |
        Enable `[debug] enabled = 1` and `[debug] log_to_file = 1` in config.ini,
        reproduce the issue, then paste relevant lines from `sdmc:/config/ryu_ldn_nx/ryu_ldn_nx.log`.
      placeholder: |
        [YYYY-MM-DD HH:MM:SS] [ERROR] ...
    validations:
      required: false

  - type: dropdown
    id: overall_status
    attributes:
      label: "Overall Compatibility Rating"
      options:
        - "5 — Perfect: Fully functional multiplayer"
        - "4 — Great: Minor issues, fully playable"
        - "3 — Good: Works with noticeable limitations"
        - "2 — Broken: Major issues, barely playable"
        - "1 — Unplayable: Does not work at all"
    validations:
      required: true

  - type: dropdown
    id: primary_issue
    attributes:
      label: "What is the main issue?"
      options:
        - Lobby creation / hosting
        - Joining a room
        - In-match stability (disconnects)
        - Room discovery / scanning
        - P2P vs Relay behavior difference
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: "Pre-submission"
      options:
        - label: "I searched existing game-compatibility issues for this game"
          required: true
        - label: "I am running the latest version of ryu\_ldn\_nx"
          required: true
        - label: "I pasted my full config.ini"
          required: true
        - label: "I tested with the latest game update available"
          required: true