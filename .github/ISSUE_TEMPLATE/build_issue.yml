name: Build / CI Issue
description: "Report a build failure or CI problem with ryu\_ldn\_nx"
title: "[BUILD] "
labels: [build, ci, bug]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Use this form for build failures, CI pipeline errors, or Docker-related issues when compiling `ryu_ldn_nx`.

        **Not for:**
        - Runtime bugs (crashes, disconnects, etc.) → use **Bug Report**
        - Feature requests → use **Feature Suggestion**
        - Documentation errors → use **Documentation Issue**

  - type: dropdown
    id: build_type
    attributes:
      label: "What were you building?"
      options:
        - Sysmodule (docker compose run --rm build)
        - Overlay (docker compose run --rm overlay)
        - Tests (docker compose run --rm test)
        - Full distribution (docker compose run --rm dist)
        - Native build (not Docker)
        - CI pipeline (GitHub Actions)
    validations:
      required: true

  - type: textarea
    id: error_output
    attributes:
      label: "Build error output"
      description: "Paste the full error output from the build command. Include the command you ran."
      placeholder: |
        $ docker compose run --rm build
        [paste full error output here]
    validations:
      required: true

  - type: input
    id: docker_version
    attributes:
      label: "Docker version (if applicable)"
      description: "Output of `docker --version`. Leave empty for native builds."
      placeholder: "e.g., Docker version 27.3.1"
    validations:
      required: false

  - type: input
    id: compose_version
    attributes:
      label: "Docker Compose version (if applicable)"
      description: "Output of `docker compose version`. Leave empty for native builds."
      placeholder: "e.g., Docker Compose version v2.32.4"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: "Host OS"
      description: "Operating system where you are running the build."
      placeholder: "e.g., Ubuntu 24.04, macOS 15.1, Windows 11 WSL2"
    validations:
      required: true

  - type: textarea
    id: git_info
    attributes:
      label: "Git information"
      description: "Branch, commit, and any local changes."
      placeholder: |
        Branch: main
        Commit: abc1234
        Local changes: none (clean working tree)
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: "Pre-submission"
      options:
        - label: "I searched existing issues for this build problem"
          required: true
        - label: "I am building from a clean checkout (no uncommitted changes)"
          required: false