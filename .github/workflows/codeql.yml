name: CodeQL

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    # Run the whole job in the official devkitPro image so host gcc AND
    # devkitA64 cross-compile are both traced by CodeQL in the same process
    # tree. Avoids apt.devkitpro.org / pkg.devkitpro.org (Cloudflare-blocked).
    container: devkitpro/devkita64:latest
    # CodeQL's LD_PRELOAD tracer adds significant per-compile-unit overhead.
    # Sysmodule + libstratosphere with LTO needs >60 min under tracing.
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        language: [cpp]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: .github/codeql-config.yml

      - name: Build host tests (CodeQL tracing)
        run: cd tests && make clean && make COVERAGE=1 test

      - name: Detach CodeQL tracer from non-compiler devkitPro packaging tools
        # CONTEXT: This does NOT disable any CodeQL security analysis. CodeQL
        # analyses C/C++ source AS IT IS COMPILED, by attaching its tracer
        # (LD_PRELOAD) to gcc/g++ to record every translation unit. That
        # attachment is left fully intact; 100% of our .cpp/.h files remain
        # analyzed by CodeQL.
        #
        # PROBLEM: LD_PRELOAD propagates to ALL child processes make spawns,
        # not only compilers. The devkitPro post-link packaging tools
        # (npdmtool, elf2nso, build_pfs0, nacptool) ship third-party binaries
        # that contain no project code and are NOT subject to CodeQL analysis,
        # but they crash under the tracer with "Failed to parse descriptor
        # json!" because the preloaded library interferes with their I/O.
        #
        # FIX: Replace each of those 4 binaries in /opt/devkitpro/tools/bin
        # with a tiny wrapper that just `unset LD_PRELOAD` and execs the
        # original (saved as <tool>.real). Compilers continue to be traced;
        # only the format-conversion utilities are spared. In-place shadow
        # (rather than PATH prepend) so the build cannot accidentally bypass
        # the wrapper via an absolute path lookup.
        run: |
          for tool in npdmtool elf2nso build_pfs0 nacptool; do
            real="/opt/devkitpro/tools/bin/$tool"
            if [ ! -f "$real.real" ]; then
              mv "$real" "$real.real"
            fi
            cat > "$real" <<'EOF'
          #!/bin/bash
          self="${0}.real"
          if [ -n "${LD_PRELOAD:-}" ]; then
            echo "[codeql-wrapper] $(basename "$0"): stripping LD_PRELOAD=$LD_PRELOAD" >&2
          fi
          unset LD_PRELOAD
          exec "$self" "$@"
          EOF
            chmod +x "$real"
          done

      - name: Build sysmodule (cross-compiled, tracked by CodeQL)
        env:
          DEVKITPRO: /opt/devkitpro
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=$DEVKITPRO/devkitARM
          export DEVKITA64=$DEVKITPRO/devkitA64
          export PATH=$DEVKITPRO/tools/bin:$DEVKITA64/bin:$PATH
          cd sysmodule/Atmosphere-libs/libstratosphere && make -j4 nx_release
          cd ../../..
          cd sysmodule && make -j4 all

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"