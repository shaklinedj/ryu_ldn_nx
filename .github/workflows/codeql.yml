name: CodeQL

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        language: [cpp]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install host build dependencies
        run: sudo apt-get update && sudo apt-get install -y g++ make python3-pip

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: .github/codeql-config.yml

      - name: Build host tests (CodeQL tracing)
        run: cd tests && make clean && make COVERAGE=1 test

      - name: Install devkitPro (native) for cross-compilation
        run: |
          if command -v dkp-pacman &>/dev/null; then
            echo "devkitPro already installed, skipping"
            exit 0
          fi
          sudo dpkg --configure -a
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends wget
          # devkitPro stopped shipping a Linux .deb on GitHub Releases and
          # apt.devkitpro.org is blocked by Cloudflare bot protection from CI.
          # Pin to the 6.0.1 .deb hosted on a community mirror, verified by
          # SHA-256. The older 1.0.2 .deb depends on libssl1.1 which is gone
          # from Ubuntu 24.04. dkp-pacman -Syyu works because Cloudflare lets
          # the pacman client User-Agent through.
          DKP_DEB_URL=https://wii.leseratte10.de/devkitPro/pacman/apt/devkitpro-pacman_6.0.1-2_amd64.deb
          DKP_DEB_SHA256=88f4ec80e0d68615c7a40713ffe591b3ebac4ad5e5e944b2be88b3726cf4a97a
          wget -O /tmp/devkitpro-pacman.deb "$DKP_DEB_URL"
          echo "$DKP_DEB_SHA256  /tmp/devkitpro-pacman.deb" | sha256sum -c -
          sudo apt-get install -y /tmp/devkitpro-pacman.deb
          sudo dkp-pacman -Syyu --noconfirm
          sudo dkp-pacman -S --noconfirm \
            switch-dev \
            libnx \
            switch-curl \
            switch-zlib \
            switch-mbedtls \
            switch-miniupnpc \
            devkitA64-gdb

      - name: Build sysmodule (cross-compiled, tracked by CodeQL)
        env:
          DEVKITPRO: /opt/devkitpro
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=$DEVKITPRO/devkitARM
          export DEVKITA64=$DEVKITPRO/devkitA64
          export PATH=$DEVKITPRO/tools/bin:$DEVKITA64/bin:$PATH
          cd sysmodule/Atmosphere-libs/libstratosphere && make -j4 nx_release
          cd ../../..
          cd sysmodule && make -j4 all

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"