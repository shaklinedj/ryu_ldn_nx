name: CodeQL

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        language: [cpp]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install host build dependencies
        run: sudo apt-get update && sudo apt-get install -y g++ make python3-pip

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: .github/codeql-config.yml

      - name: Build host tests (CodeQL tracing)
        run: cd tests && make clean && make COVERAGE=1 test

      - name: Install devkitPro (native) for cross-compilation
        run: |
          if command -v dkp-pacman &>/dev/null; then
            echo "devkitPro already installed, skipping"
            exit 0
          fi
          sudo dpkg --configure -a
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends wget gnupg pkg-config
          wget -O /tmp/install-devkitpro-pacman https://apt.devkitpro.org/install-devkitpro-pacman
          sudo bash /tmp/install-devkitpro-pacman
          sudo dkp-pacman -Syyu --noconfirm
          sudo dkp-pacman -S --noconfirm \
            switch-dev \
            libnx \
            switch-curl \
            switch-zlib \
            switch-mbedtls \
            switch-miniupnpc \
            devkitA64-gdb

      - name: Build sysmodule (cross-compiled, tracked by CodeQL)
        env:
          DEVKITPRO: /opt/devkitpro
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=$DEVKITPRO/devkitARM
          export DEVKITA64=$DEVKITPRO/devkitA64
          export PATH=$DEVKITPRO/tools/bin:$DEVKITA64/bin:$PATH
          cd sysmodule/Atmosphere-libs/libstratosphere && make -j4 nx_release
          cd ../../..
          cd sysmodule && make -j4 all

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"