name: CodeQL

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    # Run the whole job in the official devkitPro image so host gcc AND
    # devkitA64 cross-compile are both traced by CodeQL in the same process
    # tree. Avoids apt.devkitpro.org / pkg.devkitpro.org (Cloudflare-blocked).
    container: devkitpro/devkita64:latest
    # CodeQL's LD_PRELOAD tracer adds significant per-compile-unit overhead.
    # Sysmodule + libstratosphere with LTO needs >60 min under tracing.
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        language: [cpp]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: .github/codeql-config.yml

      - name: Build host tests (CodeQL tracing)
        run: cd tests && make clean && make COVERAGE=1 test

      - name: Wrap non-compiler devkitPro tools to bypass CodeQL tracer
        # CodeQL's LD_PRELOAD tracer (libtrace.so) attaches to every child
        # process spawned by make. Compilers handle this fine, but small
        # devkitPro post-link tools (npdmtool, elf2nso, build_pfs0, nacptool)
        # mis-parse their input under the tracer ("Failed to parse descriptor
        # json!"). Shadow them with wrappers that unset LD_PRELOAD before
        # exec'ing the real binary. Compiler tracing is unaffected.
        run: |
          mkdir -p /tmp/codeql-wrappers
          for tool in npdmtool elf2nso build_pfs0 nacptool; do
            cat > "/tmp/codeql-wrappers/$tool" <<EOF
          #!/bin/bash
          unset LD_PRELOAD
          exec "/opt/devkitpro/tools/bin/$tool" "\$@"
          EOF
            chmod +x "/tmp/codeql-wrappers/$tool"
          done
          echo "/tmp/codeql-wrappers" >> "$GITHUB_PATH"

      - name: Build sysmodule (cross-compiled, tracked by CodeQL)
        env:
          DEVKITPRO: /opt/devkitpro
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=$DEVKITPRO/devkitARM
          export DEVKITA64=$DEVKITPRO/devkitA64
          # Prepend wrapper dir before devkitPro tools so npdmtool & friends
          # resolve to the LD_PRELOAD-stripping wrapper.
          export PATH=/tmp/codeql-wrappers:$DEVKITPRO/tools/bin:$DEVKITA64/bin:$PATH
          cd sysmodule/Atmosphere-libs/libstratosphere && make -j4 nx_release
          cd ../../..
          cd sysmodule && make -j4 all

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"