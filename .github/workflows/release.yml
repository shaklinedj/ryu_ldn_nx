name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: read

jobs:
  verify-branch:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure tagged commit is on main
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Workflow dispatch — skipping branch check"
            exit 0
          fi
          git fetch origin main
          TAG_COMMIT="${{ github.sha }}"
          MAIN_TIP=$(git rev-parse origin/main)
          if ! git merge-base --is-ancestor "$TAG_COMMIT" "$MAIN_TIP"; then
            echo "::error::Tag ${{ github.ref_name }} is not on the main branch. Releases can only be created from main."
            exit 1
          fi
          echo "Tag ${{ github.ref_name }} is on main ✓"

  test:
    name: Tests & Coverage ≥ 80%
    runs-on: ubuntu-latest
    needs: verify-branch

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++ netcat-openbsd
          pip install gcovr
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Run unit tests with coverage
        run: cd tests && make clean && make COVERAGE=1 test

      - name: Build integration tests with coverage
        run: cd tests/integration && make clean && make COV=1 all

      - name: Start LdnServer
        run: |
          cd tests/integration
          bash prepare-compose.sh
          docker compose -f docker-compose.yml up -d
          bash wait-for-server.sh localhost 30456 60
          sleep 2

      - name: Run integration tests with coverage
        run: |
          cd tests/integration
          INTEGRATION_COMPOSE_FILE="$(pwd)/docker-compose.yml" ./run_integration_tests localhost 30456

      - name: Tear down LdnServer
        if: always()
        run: cd tests/integration && docker compose -f docker-compose.yml down -v

      - name: Enforce per-file coverage ≥ 80%
        run: python3 scripts/check-coverage.py --min 80 --root .

      - name: Compute average coverage
        id: coverage
        run: |
          python3 scripts/check-coverage.py --min 0 --root . --json /tmp/cov.json || true
          python3 <<'PYEOF' > /tmp/avg.txt
          import json
          with open('/tmp/cov.json') as f:
              d = json.load(f)
          files = [f for f in d.get('files', []) if 'sysmodule/source/' in (f.get('file', f.get('filename', '')))]
          total_lines = 0
          total_covered = 0
          for f in files:
              lines = f.get('lines', [])
              if isinstance(lines, list):
                  total_lines += len(lines)
                  total_covered += sum(1 for l in lines if l.get('count', 0) > 0)
          avg = (total_covered / total_lines * 100) if total_lines > 0 else 0
          print(f'{avg:.1f}')
          PYEOF
          echo "percent=$(cat /tmp/avg.txt)" >> $GITHUB_OUTPUT

      - name: Update coverage badge
        uses: schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.GIST_BADGE_SECRET }}
          gistID: 4277995494c6874ebb238bdbc499d9d0
          filename: coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.percent }}%
          valColorRange: ${{ steps.coverage.outputs.percent }}
          maxColorRange: 100
          minColorRange: 0

  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: test
    container: ghcr.io/ethiquema/ryu_ldn_nx:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Fix git safe directory
        run: |
          git config --global --add safe.directory '*'
          git symbolic-ref HEAD refs/heads/"${GITHUB_REF_NAME:-main}" 2>/dev/null || true

      - name: Link pre-built libraries
        run: |
          # Symlink pre-built libstratosphere.a from the container image
          # so the sysmodule Makefile finds it without rebuilding libs.
          LIB_DIR="${GITHUB_WORKSPACE}/sysmodule/Atmosphere-libs/libstratosphere/lib/nintendo_nx_arm64_armv8a/release"
          PREBUILT="/opt/ryu_ldn_nx/libstratosphere/lib/nintendo_nx_arm64_armv8a/release/libstratosphere.a"

          if [ -f "$PREBUILT" ]; then
            mkdir -p "$LIB_DIR"
            ln -s "$PREBUILT" "$LIB_DIR/libstratosphere.a"
            echo "Linked pre-built libstratosphere.a from container image"
          else
            echo "::error::Pre-built libstratosphere.a not found at $PREBUILT"
            exit 1
          fi

      - name: Detach devkitPro packaging tools from LD_PRELOAD
        run: |
          for tool in npdmtool elf2nso build_pfs0 nacptool; do
            real="/opt/devkitpro/tools/bin/$tool"
            if [ ! -f "$real.real" ]; then
              mv "$real" "$real.real"
            fi
            cat > "$real" <<'WRAPPER'
          #!/bin/bash
          self="${0}.real"
          name="$(basename "$0")"
          if [ "$name" = "npdmtool" ] && [ -f "$1" ]; then
            staged="/tmp/$(basename "$1").$$"
            cp "$1" "$staged"
            shift
            set -- "$staged" "$@"
          fi
          exec env -u LD_PRELOAD "$self" "$@"
          WRAPPER
            chmod +x "$real"
          done

      - name: Build sysmodule + overlay + dist ZIP
        env:
          DEVKITPRO: /opt/devkitpro
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=$DEVKITPRO/devkitARM
          export DEVKITA64=$DEVKITPRO/devkitA64
          export PATH=$DEVKITPRO/tools/bin:$DEVKITA64/bin:$PATH

          # Copy NPDM descriptor to /tmp to avoid filesystem issues on
          # the GitHub Actions workspace bind-mount inside the container.
          # npdmtool cannot parse JSON from the /__w/... bind-mount.
          cp "${GITHUB_WORKSPACE}/sysmodule/res/app.json" /tmp/app.json

          cd ${GITHUB_WORKSPACE}/sysmodule && make -j4 all APP_JSON=/tmp/app.json
          cd ${GITHUB_WORKSPACE}/overlay && make -j4 all
          cd ${GITHUB_WORKSPACE}/sysmodule && make dist APP_JSON=/tmp/app.json

      - name: Upload release ZIP
        uses: actions/upload-artifact@v4
        with:
          name: release-zip
          path: ryu_ldn_nx-release.zip

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: debug-symbols
          path: |
            sysmodule/ryu_ldn_nx.elf
            sysmodule/ryu_ldn_nx.nso

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download release ZIP
        uses: actions/download-artifact@v8
        with:
          name: release-zip
          path: .

      - name: Download debug symbols
        uses: actions/download-artifact@v8
        with:
          name: debug-symbols
          path: debug

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Rename ZIP with version
        run: mv ryu_ldn_nx-release.zip ryu_ldn_nx-${{ steps.version.outputs.version }}.zip

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          cat > CHANGELOG_RELEASE.md << 'HEADER'
          ## ryu_ldn_nx ${VERSION}

          Nintendo Switch LDN sysmodule for online local multiplayer with Ryujinx servers.

          ### Installation

          1. Extract the ZIP to the root of your SD card
          2. Reboot your Switch
          3. The sysmodule will start automatically
          4. Use Tesla Menu (L+Down+R3) to access the overlay

          ---

          ### Changelog
          HEADER

          if [ -n "$PREV_TAG" ]; then
            echo "" >> CHANGELOG_RELEASE.md
            echo "Changes since \`${PREV_TAG}\`:" >> CHANGELOG_RELEASE.md
            echo "" >> CHANGELOG_RELEASE.md
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s" >> CHANGELOG_RELEASE.md
          else
            echo "- Initial release" >> CHANGELOG_RELEASE.md
          fi

          echo ""
          echo "=== Generated changelog ==="
          cat CHANGELOG_RELEASE.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ryu_ldn_nx ${{ steps.version.outputs.version }}
          body_path: CHANGELOG_RELEASE.md
          draft: false
          prerelease: false
          files: |
            ryu_ldn_nx-${{ steps.version.outputs.version }}.zip
            debug/ryu_ldn_nx.elf